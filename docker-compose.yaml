name: symphony

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: symphony
      CLICKHOUSE_USER: symphony
      CLICKHOUSE_PASSWORD: symphony
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - /srv/clickhouse/users.d:/etc/clickhouse-server/users.d
    networks:
      - symphony
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: renderer
    restart: unless-stopped
    environment:
      AUTH_TOKEN: ${RENDERER_TOKEN}
    networks:
      - symphony

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - clickhouse
      - renderer
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_BRUTE_FORCE_LOGIN_PROTECTION: "true"
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_RENDERING_RENDERER_TOKEN: ${RENDERER_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/provisioned:/var/lib/grafana-dashboards:ro
    networks:
      - symphony

volumes:
  grafana-data:
    external: true
  clickhouse-data:
    external: true

networks:
  symphony:
    external: true
